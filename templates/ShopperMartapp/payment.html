{% extends "base.html" %}
{% load static %}

{% block title %}Complete Payment | ShopperMart{% endblock %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-24 flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 max-w-sm w-full text-center">
        <!-- Spinner -->
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black border-t-2 border-r-2 mx-auto mb-6"></div>
        
        <h2 class="text-xl font-bold text-gray-900 mb-2">Connecting to Secure Gateway</h2>
        <p class="text-sm text-gray-500 mb-8 leading-relaxed">Please do not close this window or press back. We are finalizing the 256-bit secure gateway...</p>
        
        <!-- Fallback button if popup gets blocked -->
        <button id="rzp-button1" class="hidden w-full bg-black text-white font-bold rounded-xl py-4 flex justify-center items-center gap-2 hover:bg-zinc-800 transition-colors">
            <span class="material-symbols-outlined text-[18px]">lock</span>
            Pay Now
        </button>

        <form action="{% url 'payment_callback' %}" method="POST" id="payment-form" class="hidden">
            {% csrf_token %}
            <input type="hidden" name="custom_order_id" value="{{ order.id }}">
        </form>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    // Critical: Use escapejs to prevent XSS (CodeRabbit Case #22)
    var options = {
        "key": "{{ razorpay_key_id|escapejs }}",
        "amount": "{{ amount|escapejs }}", 
        "currency": "INR",
        "name": "ShopperMart",
        "description": "Secure Order Payment",
        "order_id": "{{ razorpay_order_id|escapejs }}",
        "handler": function (response){
            var form = document.getElementById('payment-form');
            
            var fields = {
                "razorpay_payment_id": response.razorpay_payment_id,
                "razorpay_order_id": response.razorpay_order_id,
                "razorpay_signature": response.razorpay_signature
            };

            for (var name in fields) {
                var input = document.createElement("input");
                input.type = "hidden";
                input.name = name;
                input.value = fields[name];
                form.appendChild(input);
            }
            form.submit();
        },
        "prefill": {
            "name": "{{ order.full_name|escapejs }}",
            "email": "{{ order.email|escapejs }}",
            "contact": "{{ order.user.profile.phone|default:'9999999999'|escapejs }}"
        },
        "theme": {
            "color": "#000000" 
        },
        "modal": {
            "ondismiss": function() {
                window.location.href = "{% url 'order_detail' order.id %}";
            }
        }
    };
    
    var rzp1 = new Razorpay(options);
    
    rzp1.on('payment.failed', function (response){
        alert("Payment Failed: " + response.error.description);
        window.location.href = "{% url 'order_detail' order.id %}";
    });
    
    // Auto open once DOM is loaded
    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(() => {
            rzp1.open();
            setTimeout(() => {
                var btn = document.getElementById('rzp-button1');
                if (btn) {
                    btn.classList.remove('hidden');
                    btn.classList.add('flex');
                }
            }, 3000);
        }, 500);
    });

    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
</script>
{% endblock %}
{% endblock %}
